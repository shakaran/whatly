# Flatpak manifest for Whatly.
#
# Qt WebEngine on Flatpak needs the KDE runtime (it ships Qt6) plus the
# QtWebEngine BaseApp, which carries the huge Chromium bits so the app itself
# stays small. Build with packaging/flatpak/build-flatpak.sh, or by hand:
#
#   flatpak install -y flathub org.kde.Platform//6.9 org.kde.Sdk//6.9 \
#       io.qt.qtwebengine.BaseApp//6.9
#   flatpak-builder --user --install --force-clean build-flatpak \
#       packaging/flatpak/net.shakaran.whatly.yml
#
# Whatly's default Qt floor is 6.10, but the code's real requirement is 6.8
# (QWebEnginePermission) and the KDE 6.9 runtime's Chromium is recent enough for
# WhatsApp Web — so the build lowers the floor to 6.9 via -DQT_VERSION_MINOR (see
# config-opts). If a KDE runtime for Qt 6.10 is available, bump the three
# runtime versions to 6.10 and drop that config-opt.
app-id: net.shakaran.whatly
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
base: io.qt.qtwebengine.BaseApp
base-version: '6.9'
command: whatly

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --device=all            # camera for video calls
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.ScreenSaver
  - --filesystem=xdg-download

cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - name: whatly
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DQT_VERSION_MINOR=9
    sources:
      - type: git
        url: https://github.com/shakaran/whatly.git
        tag: v6.0.0
