name: Windows Qt WebEngine (proprietary codecs)

# EXPERIMENTAL / manual. Rebuilds Qt WebEngine with proprietary codecs
# (H.264/AAC) so WhatsApp video/voice work on Windows. A cold Chromium build
# (~7-8h) does not fit GitHub's 6h job limit, so a warm+finish pair shares an
# sccache object cache. But sccache only helps if Chromium's GN build actually
# routes through it (cc_wrapper) — use `mode: probe` (~15 min) to confirm the
# cc_wrapper wiring and sccache activity before spending hours on `mode: full`.
on:
  workflow_dispatch:
    inputs:
      qt_version:
        description: 'Qt version to match (e.g. 6.10.2)'
        required: true
        default: '6.10.2'
      mode:
        description: 'probe (fast wiring check) or full (warm + finish)'
        type: choice
        options: [probe, full]
        default: probe

concurrency:
  group: win-codecs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  probe:
    if: ${{ inputs.mode == 'probe' }}
    uses: ./.github/workflows/windows-codecs-build.yml
    with:
      qt_version: ${{ inputs.qt_version }}
      phase: probe

  warm:
    if: ${{ inputs.mode == 'full' }}
    uses: ./.github/workflows/windows-codecs-build.yml
    with:
      qt_version: ${{ inputs.qt_version }}
      phase: warm

  finish:
    needs: warm
    if: ${{ inputs.mode == 'full' && !cancelled() }}
    uses: ./.github/workflows/windows-codecs-build.yml
    with:
      qt_version: ${{ inputs.qt_version }}
      phase: finish
